services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quinoa-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quinoa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quinoa_password}
      POSTGRES_DB: ${POSTGRES_DB:-quinoa}
    ports:
      - "${POSTGRES_PORT:-5431}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quinoa}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quinoa-network

  # Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quinoa-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-quinoa}:${POSTGRES_PASSWORD:-quinoa_password}@postgres:5432/${POSTGRES_DB:-quinoa}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quinoa-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  quinoa-network:
    driver: bridge
